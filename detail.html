<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食譜詳情</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        body { background-color: #f9f6f0; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #ff9f43; color: white; padding: 1.5rem; display: flex; align-items: center; justify-content: space-between; }
        .btn-back { color: white; text-decoration: none; font-weight: bold; background: rgba(0,0,0,0.1); padding: 0.5rem 1rem; border-radius: 20px; }
        .container { max-width: 800px; margin: 2rem auto; width: 100%; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 1.5rem; }
        .detail-image { width: 100%; max-height: 450px; object-fit: cover; border-radius: 8px; margin-bottom: 1.5rem; }
        .detail-title { font-size: 1.8rem; color: #ff6b6b; margin-bottom: 1rem; border-bottom: 2px solid #ff9f43; padding-bottom: 0.5rem; }
        .detail-desc { font-size: 1.1rem; line-height: 1.8; white-space: pre-line; margin-bottom: 2rem; color: #444; }
        
        /* 料理步驟區塊樣式 */
        .steps-section { margin-top: 2rem; border-top: 2px dashed #ff9f43; padding-top: 1.5rem; }
        .steps-section h4 { font-size: 1.4rem; color: #d35400; margin-bottom: 1rem; }
        .step-card { background: #fffdf9; border: 1px solid #ffeaa7; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .step-num { background: #ff9f43; color: white; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; }
        .step-img { width: 100%; max-height: 350px; object-fit: cover; border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .step-text { font-size: 1.05rem; line-height: 1.6; color: #555; }
        
        .video-section { background: #fef4ea; padding: 1rem; border-radius: 8px; margin-top: 2rem; }
        .video-section h4 { margin-bottom: 0.8rem; color: #d35400; }
        .video-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
        .btn-video { display: inline-block; background-color: #ff4757; color: white; text-decoration: none; padding: 0.6rem 1.2rem; border-radius: 25px; font-weight: bold; font-size: 0.95rem; }
        footer { text-align: center; padding: 1.5rem; background-color: #333; color: #fff; margin-top: auto; }
        
        @media (min-width: 600px) {
            .step-card { flex-direction: row; align-items: flex-start; }
            .step-img { width: 250px; height: 160px; }
            .step-info { flex: 1; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="btn-back">⬅ 回首頁</a>
        <h2 id="pageHeaderTitle">食譜詳情</h2>
        <div style="width: 70px;"></div>
    </header>

    <main class="container">
        <img id="detailImg" class="detail-image" src="" alt="食譜主圖">
        <h3 id="detailTitle" class="detail-title">讀取中...</h3>
        <p id="detailDesc" class="detail-desc"></p>
        
        <div class="steps-section" id="stepsSection" style="display: none;">
            <h4>🍳 料理步驟說明：</h4>
            <div id="stepsContainer"></div>
        </div>
        
        <div class="video-section">
            <h4>📺 教學影片連結：</h4>
            <div id="videoButtonsContainer" class="video-grid"></div>
        </div>
    </main>

    <footer>
        <p>© 2026 我的食譜網站.</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIMh_k-zG-HFEtGODjDtGqINk6SAAWQ1M",
            authDomain: "my-recipe-app-bb246.firebaseapp.com",
            projectId: "my-recipe-app-bb246",
            storageBucket: "my-recipe-app-bb246.firebasestorage.app",
            messagingSenderId: "491978965210",
            appId: "1:491978965210:web:df50529ccd59d3418965e3",
            measurementId: "G-ZBR8SHB2QC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const recipeId = urlParams.get('id');

        async function loadRecipeDetail() {
            if (!recipeId) return;
            const docRef = doc(db, "recipes", recipeId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const recipe = docSnap.data();
                document.getElementById('detailImg').src = recipe.image;
                document.getElementById('detailTitle').innerText = recipe.name;
                document.getElementById('detailDesc').innerText = recipe.desc;
                document.title = recipe.name + " - 食譜詳情";

                // 渲染步驟圖片與文字
                const stepsContainer = document.getElementById('stepsContainer');
                stepsContainer.innerHTML = '';
                if (recipe.steps && recipe.steps.length > 0) {
                    document.getElementById('stepsSection').style.display = 'block';
                    recipe.steps.forEach((step, index) => {
                        const card = document.createElement('div');
                        card.className = 'step-card';
                        card.innerHTML = `
                            <div class="step-num">${index + 1}</div>
                            ${step.img ? `<img class="step-img" src="${step.img}">` : ''}
                            <div class="step-info">
                                <p class="step-text">${step.text}</p>
                            </div>
                        `;
                        stepsContainer.appendChild(card);
                    });
                }

                // 渲染影片
                const videoContainer = document.getElementById('videoButtonsContainer');
                videoContainer.innerHTML = '';
                if(recipe.youtubes && recipe.youtubes.length > 0) {
                    recipe.youtubes.forEach((url, index) => {
                        const btn = document.createElement('a');
                        btn.className = 'btn-video';
                        btn.href = url;
                        btn.target = '_blank';
                        btn.innerText = `📺 參考影片 ${index + 1}`;
                        videoContainer.appendChild(btn);
                    });
                } else {
                    videoContainer.innerHTML = '<p style="color:#888; font-size:0.9rem;">本食譜暫無提供影片</p>';
                }
            }
        }

        loadRecipeDetail();
    </script>
</body>
</html>
