<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的食譜</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        body { background-color: #f9f6f0; color: #4a3c31; padding-bottom: 3rem; }
        
        header { background: linear-gradient(135deg, #ffb347, #ffcc33); padding: 2.5rem 1rem; text-align: center; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header h1 { font-size: 2.2rem; font-weight: bold; letter-spacing: 2px; text-shadow: 1px 1px 3px rgba(0,0,0,0.15); }
        
        .search-container { max-width: 500px; margin: -1.5rem auto 2rem; padding: 0 1rem; display: flex; gap: 10px; position: relative; z-index: 10; }
        .search-container input { flex: 1; padding: 0.8rem 1.5rem; border: none; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 1rem; outline: none; }
        
        .recipes-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; padding: 0 1rem; }
        
        /* 核心修正：固定圖片區塊高度，確保下方所有卡片內容的對齊線（紅線位置）絕對一致 */
        .recipe-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 6px 12px rgba(0,0,0,0.05); display: flex; flex-direction: column; cursor: pointer; transition: 0.3s; border: 1px solid #f0e6df; height: 100%; }
        .recipe-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
        
        /* 固定容器高度為 260px，並用 contain 保持完整不裁切 */
        .card-img-wrapper { width: 100%; height: 260px; background: #fafafa; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #f5ebe6; padding: 5px; }
        .recipe-card img { max-width: 100%; max-height: 100%; object-fit: contain; width: auto; height: auto; }
        
        .recipe-info { padding: 1.2rem; display: flex; flex-direction: column; flex: 1; justify-content: space-between; }
        .recipe-info h3 { font-size: 1.15rem; color: #d35400; margin-bottom: 0.5rem; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .recipe-info p { font-size: 0.9rem; color: #7f8c8d; line-height: 1.4; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.8em; }
        .video-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: auto; }
        .badge { background: #ff4757; color: white; font-size: 0.75rem; padding: 3px 8px; border-radius: 4px; font-weight: bold; }

        /* 彈出詳細視窗 */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 999; padding: 10px; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-box { background: white; padding: 1.5rem; border-radius: 12px; width: 100%; max-width: 750px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-close { float: right; font-size: 1.5rem; cursor: pointer; color: #aaa; }
        .modal-close:hover { color: #333; }
        
        .modal-main-img { width: 100%; height: auto; max-height: 650px; object-fit: contain; border-radius: 6px; margin: 1rem 0; box-shadow: 0 4px 10px rgba(0,0,0,0.1); background: #fdfdfd; }
        .modal-desc { background: #fff3e0; padding: 1rem; border-radius: 6px; color: #e67e22; margin-bottom: 1.5rem; line-height: 1.5; font-weight: 500; }
        
        .video-section h4 { margin-bottom: 0.5rem; color: #c0392b; }
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
        @media(max-width: 500px) { .video-grid { grid-template-columns: 1fr; } }
        .video-btn { display: block; text-align: center; background: #ff4757; color: white; text-decoration: none; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <h1>🍳 我的食譜</h1>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="搜尋想吃的菜單與料理...">
    </div>

    <main class="recipes-grid" id="recipesGrid">
        <div style="grid-column: 1/-1; text-align: center; color: #888; padding: 3rem;">雲端美味加載中...</div>
    </main>

    <div class="modal" id="detailModal">
        <div class="modal-box">
            <span class="modal-close" id="closeModalBtn">&times;</span>
            <h2 id="modalTitle" style="color: #d35400;">食譜名稱</h2>
            
            <img id="modalImg" class="modal-main-img" src="" alt="食譜圖">
            
            <div id="modalDesc" class="modal-desc">簡介內容</div>

            <div class="video-section" id="modalVideoSection">
                <h4>📺 示範教學影片：</h4>
                <div class="video-grid" id="modalVideoGrid"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIMh_k-zG-HFEtGODjDtGqINk6SAAWQ1M",
            authDomain: "my-recipe-app-bb246.firebaseapp.com",
            projectId: "my-recipe-app-bb246",
            storageBucket: "my-recipe-app-bb246.firebasestorage.app",
            messagingSenderId: "491978965210",
            appId: "1:491978965210:web:df50529ccd59d3418965e3",
            measurementId: "G-ZBR8SHB2QC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allRecipes = [];

        async function fetchRecipes() {
            try {
                const querySnapshot = await getDocs(collection(db, "recipes"));
                allRecipes = [];
                querySnapshot.forEach(doc => allRecipes.push({ id: doc.id, ...doc.data() }));
                renderRecipes(allRecipes);
            } catch (err) {
                console.error("加載失敗:", err);
            }
        }

        function renderRecipes(list) {
            const grid = document.getElementById('recipesGrid');
            grid.innerHTML = '';
            if(list.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#888; padding:3rem;">找不到相符的食譜唷！</div>`;
                return;
            }
            list.forEach(recipe => {
                const card = document.createElement('div');
                card.className = 'recipe-card';
                
                let badgesHtml = '';
                if(recipe.youtubes && recipe.youtubes.length > 0) {
                    recipe.youtubes.forEach((url, index) => {
                        badgesHtml += `<span class="badge">📺 影片 ${index+1}</span>`;
                    });
                }

                card.innerHTML = `
                    <div class="card-img-wrapper">
                        <img src="${recipe.image}" alt="${recipe.name}">
                    </div>
                    <div class="recipe-info">
                        <h3>${recipe.name}</h3>
                        <p>${recipe.desc || ''}</p>
                        <div class="video-badges">${badgesHtml}</div>
                    </div>
                `;
                card.addEventListener('click', () => showDetail(recipe));
                grid.appendChild(card);
            });
        }

        function showDetail(recipe) {
            document.getElementById('modalTitle').innerText = recipe.name;
            document.getElementById('modalImg').src = recipe.image;
            document.getElementById('modalDesc').innerText = recipe.desc || '暫無描述';
            
            const videoGrid = document.getElementById('modalVideoGrid');
            videoGrid.innerHTML = '';
            if(recipe.youtubes && recipe.youtubes.length > 0) {
                document.getElementById('modalVideoSection').style.display = 'block';
                recipe.youtubes.forEach((url, i) => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.target = '_blank';
                    a.className = 'video-btn';
                    a.innerText = `▶ 點選播放教學影片 ${i+1}`;
                    videoGrid.appendChild(a);
                });
            } else {
                document.getElementById('modalVideoSection').style.display = 'none';
            }

            document.getElementById('detailModal').classList.add('active');
        }

        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('detailModal').classList.remove('active');
        });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const k = e.target.value.toLowerCase().trim();
            const filtered = allRecipes.filter(r => r.name.toLowerCase().includes(k) || (r.desc && r.desc.toLowerCase().includes(k)));
            renderRecipes(filtered);
        });

        fetchRecipes();
    </script>
</body>
</html>
