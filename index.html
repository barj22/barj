<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的食譜</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        body { background-color: #f9f6f0; color: #4a3c31; padding-bottom: 3rem; }
        
        header { background: linear-gradient(135deg, #ffb347, #ffcc33); padding: 2.5rem 1rem; text-align: center; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        header h1 { font-size: 2.2rem; font-weight: bold; letter-spacing: 2px; text-shadow: 1px 1px 3px rgba(0,0,0,0.15); }
        
        .search-container { max-width: 500px; margin: -1.5rem auto 2rem; padding: 0 1rem; display: flex; gap: 10px; position: relative; z-index: 10; }
        .search-container input { flex: 1; padding: 0.8rem 1.5rem; border: none; border-radius: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 1rem; outline: none; }
        
        .recipes-grid { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; padding: 0 1rem; }
        
        .recipe-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 6px 12px rgba(0,0,0,0.05); display: flex; flex-direction: column; cursor: pointer; transition: 0.3s; border: 1px solid #f0e6df; height: 100%; text-decoration: none; color: inherit; }
        .recipe-card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
        
        .card-img-wrapper { width: 100%; height: 260px; background: #fafafa; display: flex; justify-content: center; align-items: center; border-bottom: 1px solid #f5ebe6; padding: 5px; }
        .recipe-card img { max-width: 100%; max-height: 100%; object-fit: contain; width: auto; height: auto; }
        
        .recipe-info { padding: 1.2rem; display: flex; flex-direction: column; flex: 1; justify-content: space-between; }
        .recipe-info h3 { font-size: 1.15rem; color: #d35400; margin-bottom: 0.5rem; display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        .recipe-info p { font-size: 0.9rem; color: #7f8c8d; line-height: 1.4; margin-bottom: 1rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.8em; }
        .video-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: auto; }
        .badge { background: #ff4757; color: white; font-size: 0.75rem; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>🍳 我的食譜</h1>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="搜尋想吃的菜單與料理...">
    </div>

    <main class="recipes-grid" id="recipesGrid">
        <div style="grid-column: 1/-1; text-align: center; color: #888; padding: 3rem;">雲端美味加載中...</div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIMh_k-zG-HFEtGODjDtGqINk6SAAWQ1M",
            authDomain: "my-recipe-app-bb246.firebaseapp.com",
            projectId: "my-recipe-app-bb246",
            storageBucket: "my-recipe-app-bb246.firebasestorage.app",
            messagingSenderId: "491978965210",
            appId: "1:491978965210:web:df50529ccd59d3418965e3",
            measurementId: "G-ZBR8SHB2QC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allRecipes = [];

        async function fetchRecipes() {
            try {
                const querySnapshot = await getDocs(collection(db, "recipes"));
                allRecipes = [];
                querySnapshot.forEach(doc => allRecipes.push({ id: doc.id, ...doc.data() }));
                
                // 🔥 核心修正：前台顯示也根據 sortOrder 進行由小到大排序
                allRecipes.sort((a, b) => {
                    const orderA = a.sortOrder !== undefined ? a.sortOrder : 999;
                    const orderB = b.sortOrder !== undefined ? b.sortOrder : 999;
                    return orderA - orderB;
                });

                renderRecipes(allRecipes);
            } catch (err) {
                console.error("加載失敗:", err);
            }
        }

        function renderRecipes(list) {
            const grid = document.getElementById('recipesGrid');
            grid.innerHTML = '';
            if(list.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#888; padding:3rem;">找不到相符的食譜唷！</div>`;
                return;
            }
            list.forEach(recipe => {
                const card = document.createElement('a');
                card.className = 'recipe-card';
                card.href = `recipe.html?id=${recipe.id}`;
                
                let badgesHtml = '';
                if(recipe.youtubes && recipe.youtubes.length > 0) {
                    recipe.youtubes.forEach((url, index) => {
                        badgesHtml += `<span class="badge">📺 影片 ${index+1}</span>`;
                    });
                }

                card.innerHTML = `
                    <div class="card-img-wrapper">
                        <img src="${recipe.image}" alt="${recipe.name}">
                    </div>
                    <div class="recipe-info">
                        <h3>${recipe.name}</h3>
                        <p>${recipe.desc || ''}</p>
                        <div class="video-badges">${badgesHtml}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const k = e.target.value.toLowerCase().trim();
            const filtered = allRecipes.filter(r => r.name.toLowerCase().includes(k) || (r.desc && r.desc.toLowerCase().includes(k)));
            renderRecipes(filtered);
        });

        fetchRecipes();
    </script>
</body>
</html>
