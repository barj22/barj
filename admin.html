<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script>
        // 安全檢查鎖：如果沒經過 login.html 登入，直接打網址進來會被立馬踢走
        if (sessionStorage.getItem('recipe_admin_auth') !== 'authenticated_true') {
            alert('⚠️ 請先進行安全登入認證！');
            window.location.href = 'login.html';
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的食譜管理後台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        body { background-color: #f4f6f9; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #2c3e50; color: white; padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .btn-logout { color: #fff; text-decoration: none; background:#7f8c8d; padding:0.5rem 1rem; border-radius:4px; cursor: pointer; }
        .btn-add { background:#2ecc71; color:white; border:none; padding:0.6rem 1.2rem; border-radius:4px; font-weight:bold; cursor:pointer; }
        main { flex: 1; padding: 2rem 1rem; max-width: 1000px; margin: 0 auto; width: 100%; }
        .admin-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .admin-table th, .admin-table td { padding: 1rem; text-align: left; border-bottom: 1px solid #eee; vertical-align: middle; }
        .admin-table th { background-color: #34495e; color: white; }
        
        .thumb { width: 60px; max-height: 80px; object-fit: contain; border-radius: 4px; background: #eee; border: 1px solid #ddd; }
        
        .actions-btns button { padding: 0.4rem 0.8rem; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; margin-right: 0.3rem; }
        .btn-edit { background: #f1c40f; }
        .btn-del { background: #e74c3c; }
        
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; justify-content:center; align-items:center; opacity:0; pointer-events:none; transition:0.3s; z-index:999; }
        .modal.active { opacity:1; pointer-events:auto; }
        .modal-box { background:white; padding:2rem; border-radius:8px; width:95%; max-width:600px; max-height:90vh; overflow-y:auto; }
        .form-group { margin-bottom: 1.2rem; background: #fafafa; padding: 0.8rem; border-radius: 6px; border-left: 4px solid #34495e; }
        .form-group label { display:block; margin-bottom: 0.3rem; font-weight:bold; }
        .form-group input, .form-group textarea { width:100%; padding:0.5rem; border:1px solid #ccc; border-radius:4px; margin-bottom: 0.3rem; }
        
        .video-input-row { display:flex; gap:0.5rem; margin-bottom:0.4rem; }
        .btn-danger { background: #e74c3c; color: white; border: none; padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; }
        .modal-actions { display:flex; justify-content:flex-end; gap:1rem; margin-top:1.5rem; }
    </style>
</head>
<body>

    <header>
        <div id="logoutBtn" class="btn-logout">登出並返回首頁</div>
        <h2>🔐 我的食譜管理後台</h2>
        <button id="addBtn" class="btn-add">➕ 新增食譜</button>
    </header>

    <main>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>縮圖</th>
                    <th>食譜名稱</th>
                    <th>操作功能</th>
                </tr>
            </thead>
            <tbody id="adminTbody">
                <tr><td colspan="3" style="text-align:center; color:#888;">雲端資料加載中...</td></tr>
            </tbody>
        </table>
    </main>

    <div class="modal" id="recipeModal">
        <div class="modal-box">
            <h3 id="modalTitle">新增食譜</h3>
            <form id="recipeForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>食譜名稱：</label>
                    <input type="text" id="recipeName" required placeholder="例如：酥炸鮮魚片明太子醬拌飯">
                </div>
                <div class="form-group">
                    <label>上傳食譜完整大圖：</label>
                    <input type="file" id="recipeImgFile" accept="image/*">
                </div>
                
                <div class="form-group">
                    <label>YouTube 影片連結 (最多 6 個)：</label>
                    <div id="videoInputsContainer"></div>
                    <button type="button" id="addVideoFieldBtn" style="padding:0.3rem; background:#3498db; color:white; border:none; border-radius:4px; cursor:pointer;">+ 增加影片欄位</button>
                </div>
                <div class="form-group">
                    <label>簡易作法/描述：</label>
                    <textarea id="recipeDesc" rows="4" required placeholder="請輸入食材與步驟簡述..."></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancelBtn" style="padding:0.5rem 1rem; cursor:pointer;">取消</button>
                    <button type="submit" id="submitBtn" style="padding:0.5rem 1rem; background:#2ecc71; color:white; border:none; cursor:pointer; font-weight:bold;">儲存食譜</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIMh_k-zG-HFEtGODjDtGqINk6SAAWQ1M",
            authDomain: "my-recipe-app-bb246.firebaseapp.com",
            projectId: "my-recipe-app-bb246",
            storageBucket: "my-recipe-app-bb246.firebasestorage.app",
            messagingSenderId: "491978965210",
            appId: "1:491978965210:web:df50529ccd59d3418965e3",
            measurementId: "G-ZBR8SHB2QC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const recipesCollection = collection(db, "recipes");
        let allRecipes = [];

        const defaultImg = "https://images.unsplash.com/photo-1495521821757-a1efb6729352?auto=format&fit=crop&w=500&q=80";

        // 登出按鈕邏輯
        document.getElementById('logoutBtn').addEventListener('click', () => {
            sessionStorage.removeItem('recipe_admin_auth');
            window.location.href = 'index.html';
        });

        async function loadAdminData() {
            try {
                const querySnapshot = await getDocs(recipesCollection);
                allRecipes = [];
                const tbody = document.getElementById('adminTbody');
                tbody.innerHTML = '';
                querySnapshot.forEach(doc => allRecipes.push({ id: doc.id, ...doc.data() }));
                
                if (allRecipes.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#888;">目前資料庫沒有任何食譜。</td></tr>`;
                    return;
                }

                allRecipes.forEach(recipe => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><img class="thumb" src="${recipe.image || defaultImg}"></td>
                        <td><strong>${recipe.name}</strong></td>
                        <td class="actions-btns">
                            <button class="btn-edit" data-id="${recipe.id}">修改</button>
                            <button class="btn-del" data-id="${recipe.id}" data-name="${recipe.name}">刪除</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                document.querySelectorAll('.btn-edit').forEach(b => b.addEventListener('click', e => openModal(e.target.dataset.id)));
                document.querySelectorAll('.btn-del').forEach(b => b.addEventListener('click', e => deleteItem(e.target.dataset.id, e.target.dataset.name)));
            } catch (err) {
                console.error("讀取失敗:", err);
            }
        }

        const modal = document.getElementById('recipeModal');
        const videoInputsContainer = document.getElementById('videoInputsContainer');

        window.removeVideoRow = function(btn) { btn.parentElement.remove(); }
        function createVideoRow(value = "") {
            if (videoInputsContainer.querySelectorAll('.video-input-row').length >= 6) return alert("最多6個影片！");
            const row = document.createElement('div');
            row.className = 'video-input-row';
            row.innerHTML = `
                <input type="url" class="recipe-video-url" placeholder="影片網址" value="${value}">
                <button type="button" class="btn-danger" onclick="removeVideoRow(this)">✕</button>
            `;
            videoInputsContainer.appendChild(row);
        }
        document.getElementById('addVideoFieldBtn').addEventListener('click', () => createVideoRow());

        function openModal(id = "") {
            document.getElementById('recipeForm').reset();
            videoInputsContainer.innerHTML = '';
            if(id === "") {
                document.getElementById('modalTitle').innerText = "新增食譜";
                document.getElementById('editId').value = "";
                createVideoRow();
            } else {
                document.getElementById('modalTitle').innerText = "修改食譜";
                document.getElementById('editId').value = id;
                const recipe = allRecipes.find(r => r.id === id);
                document.getElementById('recipeName').value = recipe.name || "";
                document.getElementById('recipeDesc').value = recipe.desc || "";
                if(recipe.youtubes) recipe.youtubes.forEach(url => createVideoRow(url));
            }
            modal.classList.add('active');
        }

        document.getElementById('addBtn').addEventListener('click', () => openModal(""));
        document.getElementById('cancelBtn').addEventListener('click', () => modal.classList.remove('active'));

        function compressImage(file, maxWidth = 1000, quality = 0.7) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                };
            });
        }

        document.getElementById('recipeForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = "處理中...";
            submitBtn.disabled = true;

            const id = document.getElementById('editId').value;
            const urls = [];
            videoInputsContainer.querySelectorAll('.recipe-video-url').forEach(i => { if(i.value.trim()) urls.push(i.value.trim()); });

            let imgData = defaultImg;
            if (id) {
                const found = allRecipes.find(r => r.id === id);
                if (found && found.image) imgData = found.image;
            }
            
            const fileInput = document.getElementById('recipeImgFile');
            if(fileInput.files.length > 0) {
                imgData = await compressImage(fileInput.files[0]); 
            }

            const data = { 
                name: document.getElementById('recipeName').value, 
                image: imgData, 
                youtubes: urls, 
                desc: document.getElementById('recipeDesc').value
            };

            try {
                if(id === "") {
                    await addDoc(recipesCollection, data);
                } else {
                    await updateDoc(doc(db, "recipes", id), data);
                }
                alert("🎉 儲存成功！");
                modal.classList.remove('active');
                loadAdminData();
            } catch (err) {
                alert("❌ 儲存失敗！");
                console.error(err);
            } finally {
                submitBtn.innerText = "儲存食譜";
                submitBtn.disabled = false;
            }
        });

        async function deleteItem(id, name) {
            if(confirm(`確定刪除「${name}」嗎？`)) {
                await deleteDoc(doc(db, "recipes", id));
                loadAdminData();
            }
        }

        loadAdminData();
    </script>
</body>
</html>
