<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食譜詳情</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        body { background-color: #f9f6f0; color: #4a3c31; padding: 2rem 1rem; }
        .container { max-width: 850px; margin: 0 auto; background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); }
        
        .top-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .btn-back { display: inline-block; color: #7f8c8d; text-decoration: none; font-size: 1rem; background: #eee; padding: 6px 15px; border-radius: 20px; font-weight: bold; }
        .btn-back:hover { background: #ddd; }

        h2 { color: #d35400; margin-bottom: 1.5rem; font-size: 2.2rem; border-bottom: 2px solid #ffb347; padding-bottom: 0.5rem; }
        
        .intro-section { display: flex; gap: 2rem; margin-bottom: 2.5rem; align-items: flex-start; }
        .main-recipe-img { width: 45%; max-height: 350px; object-fit: contain; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); background: #fafafa; }
        .desc-box { flex: 1; background: #fff3e0; padding: 1.2rem; border-radius: 8px; color: #e67e22; line-height: 1.6; font-size: 1.05rem; white-space: pre-line; min-height: 150px; }
        
        .video-section { margin-bottom: 2.5rem; background: #fdfaf7; padding: 1.2rem; border-radius: 8px; border: 1px dashed #ffcc33; }
        .video-section h3 { color: #c0392b; margin-bottom: 0.8rem; }
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .video-btn { display: block; text-align: center; background: #ff4757; color: white; text-decoration: none; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 1rem; }
        .video-btn:hover { background: #ff6b81; }

        /* 🔥 新增：PDF 下載按鈕專屬樣式 */
        .pdf-download-block { border-top: 1px dashed #ddd; padding-top: 12px; margin-top: 5px; }
        .btn-mega-pdf { display: block; text-align: center; background: #9b59b6; color: white; text-decoration: none; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 1rem; }
        .btn-mega-pdf:hover { background: #8e44ad; }

        .steps-section { border-top: 2px dashed #e0d0c0; padding-top: 2rem; margin-top: 2rem; }
        .steps-section h3 { color: #2c3e50; margin-bottom: 1rem; font-size: 1.3rem; }
        .step-large-img { width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #fafafa; }

        @media(max-width: 700px) {
            .intro-section { flex-direction: column; }
            .main-recipe-img { width: 100%; max-height: 300px; }
            .video-grid { grid-template-columns: 1fr; }
        }
        .loading { text-align: center; color: #888; font-size: 1.2rem; padding: 5rem 0; }
    </style>
</head>
<body>

    <div class="container" id="contentContainer">
        <div class="loading">美味食譜同步中...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBIMh_k-zG-HFEtGODjDtGqINk6SAAWQ1M",
            authDomain: "my-recipe-app-bb246.firebaseapp.com",
            projectId: "my-recipe-app-bb246",
            storageBucket: "my-recipe-app-bb246.firebasestorage.app",
            messagingSenderId: "491978965210",
            appId: "1:491978965210:web:df50529ccd59d3418965e3",
            measurementId: "G-ZBR8SHB2QC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const recipeId = urlParams.get('id');

        async function loadRecipeDetail() {
            const container = document.getElementById('contentContainer');
            if(!recipeId) {
                container.innerHTML = `<p>找不到該食譜編號！</p>`;
                return;
            }

            try {
                const docRef = doc(db, "recipes", recipeId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const recipe = docSnap.data();
                    
                    // 1. 處理影片區塊
                    let videoHtml = '';
                    if((recipe.youtubes && recipe.youtubes.length > 0) || recipe.pdfUrl) {
                        videoHtml = `<div class="video-section"><h3>📺 示範教學影片：</h3>`;
                        
                        if(recipe.youtubes && recipe.youtubes.length > 0) {
                            videoHtml += `<div class="video-grid">`;
                            recipe.youtubes.forEach((url, i) => {
                                videoHtml += `<a href="${url}" target="_blank" class="video-btn">▶ 點選播放教學影片 ${i+1}</a>`;
                            });
                            videoHtml += `</div>`;
                        }
                        
                        // 🔥 核心修正：在示範影片區塊下方，如果有設定 pdfUrl 就顯示下載按鈕
                        if(recipe.pdfUrl) {
                            videoHtml += `
                                <div class="pdf-download-block">
                                    <a href="${recipe.pdfUrl}" target="_blank" class="btn-mega-pdf">📥 下載此食譜完整版 PDF 檔案</a>
                                </div>
                            `;
                        }
                        
                        videoHtml += `</div>`;
                    }

                    // 2. 處理步驟圖區塊
                    let stepImageHtml = '';
                    if(recipe.stepImage) {
                        stepImageHtml = `
                            <div class="steps-section">
                                <h3>📋 詳細料理步驟流程圖：</h3>
                                <img class="step-large-img" src="${recipe.stepImage}" alt="步驟流程圖">
                            </div>
                        `;
                    } else {
                        stepImageHtml = `
                            <div class="steps-section" style="text-align:center; color:#999; padding:1rem; background:#f5f5f5; border-radius:6px;">
                                💡 此食譜尚未上傳詳細步驟流程大圖。
                            </div>
                        `;
                    }

                    // 3. 組合渲染
                    container.innerHTML = `
                        <div class="top-actions">
                            <a href="index.html" class="btn-back">⬅ 返回食譜首頁</a>
                        </div>
                        <div id="printArea">
                            <h2>${recipe.name}</h2>
                            
                            <div class="intro-section">
                                <img class="main-recipe-img" src="${recipe.image}" alt="${recipe.name}">
                                <div class="desc-box">
                                    <strong>💡 料理簡述與食材：</strong><br>${recipe.desc || '暫無說明'}
                                </div>
                            </div>

                            ${videoHtml}
                            ${stepImageHtml}
                        </div>
                    `;

                } else {
                    container.innerHTML = `<p>該食譜已不存在！</p>`;
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = `<p>雲端連線發生錯誤！</p>`;
            }
        }

        loadRecipeDetail();
    </script>
</body>
</html>
